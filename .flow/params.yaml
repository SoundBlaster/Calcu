# .flow/params.yaml
# Project configuration for Flow.

project:
  name: Calcu
  description: Responsive calculator app built with React 19, TypeScript, Vite, Vitest, and Biome.
  language: TypeScript
  package_manager: npm
  default_branch: main

verify:
  tests: npm run test:run
  lint: npm run lint
  format: npm run format:check
  typecheck: npm run typecheck
  coverage: npm run test:coverage
  coverage_threshold: 80

task_system:
  kind: file
  project_key: CALCU
  task_url_template: "SPECS/Workplan.md#{task_id}-{task_name_slug}"

structure:
  source: src/
  tests: src/
