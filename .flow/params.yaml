# .flow/params.yaml
# Project-specific config for the Calcu app.

project:
  name: Calcu
  description: Visual-first responsive calculator app built with React and TypeScript
  language: TypeScript
  package_manager: npm
  default_branch: main

verify:
  tests: npm run test -- --run
  lint: npm run lint
  format: npm run format
  typecheck: npm run typecheck

task_system:
  kind: file                # file | github | jira | linear | none
  project_key: Calcu        # optional lightweight scope key
  task_url_template: "SPECS/Workplan.md#phase-1--foundation-and-tooling"  # optional markdown anchor template

structure:
  source: src/
